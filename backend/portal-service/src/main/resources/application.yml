server:
  port: 7084

spring:
  application:
    name: portal-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:healthdb}
    username: ${DB_USER:svc_portal}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-init-sql: |
        SET search_path TO dev, public;
        SET app.current_user_id = '';
        SET app.current_user_role = 'db_system';
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: dev
    open-in-view: false
  flyway:
    enabled: false  # Schema owned by patient-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/healthcare/protocol/openid-connect/certs}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

healthcare:
  encryption:
    key: ${PHI_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  jwt:
    secret: ${JWT_SECRET:healthcare-portal-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
    expiry-hours: ${JWT_EXPIRY_HOURS:24}
    password-reset-minutes: ${JWT_RESET_MINUTES:15}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
